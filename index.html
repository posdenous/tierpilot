<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="TierPilot - Interactive decision tool for choosing between local LLMs, frontier APIs, or hybrid approaches" />
    <meta name="theme-color" content="#0a0a0b" />
    <title>TierPilot — Local vs Frontier LLM Decision Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="app" class="min-h-screen bg-background text-foreground">
      <!-- Offline banner - hidden by default -->
      <div id="offline-banner" class="hidden fixed top-0 left-0 right-0 z-50 bg-warning/90 text-warning-foreground px-4 py-2 text-center text-sm font-medium" role="alert" aria-live="polite">
        You're offline. Some features may be unavailable.
      </div>
      
      <!-- Header -->
      <header class="site-header">
        <div class="site-header-inner">
          <div class="site-header-left">
            <a href="/" class="site-logo" aria-label="TierPilot home">
              <span class="site-logo-icon">⚡</span>
              <span class="site-logo-text">TierPilot</span>
            </a>
            <span class="site-tagline" id="header-tagline">Local vs Frontier LLM Decision Tool</span>
          </div>
          <div class="site-header-right">
            <div id="language-switcher-container"></div>
          </div>
        </div>
      </header>
      
      <!-- Main content container -->
      <main id="main-content" class="container mx-auto px-4 py-8 max-w-3xl" role="main">
        <!-- Content injected by JavaScript -->
      </main>
      
      <!-- Footer -->
      <footer class="fixed bottom-0 left-0 right-0 py-4 text-center text-sm text-muted">
        <button id="footer-explainer-link" class="hover:text-foreground transition-colors underline underline-offset-4 focus:outline-none focus:ring-2 focus:ring-accent focus:ring-offset-2 focus:ring-offset-background rounded" aria-label="Learn what TierPilot is and how it works">
          What is this?
        </button>
      </footer>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
